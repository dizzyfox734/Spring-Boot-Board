<html layout:decorate="~{layout}">

<div layout:fragment="content" class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-5 text-center">
                    <span class="badge bg-danger mb-3">403 Forbidden</span>
                    <h1 class="display-6 fw-bold mb-3">접근 권한이 없습니다</h1>
                    <p class="text-muted mb-4">
                        현재 계정으로는 이 페이지나 기능에 접근할 수 없습니다.
                    </p>

                    <div class="alert alert-danger text-start mb-4" th:if="${errorMessage != null and !#strings.isEmpty(errorMessage)}">
                        <strong>상세 메시지</strong>
                        <div class="mt-2" th:text="${errorMessage}"></div>
                    </div>

                    <div class="d-flex justify-content-center gap-2">
                        <a th:href="@{/}" class="btn btn-primary">메인으로</a>
                        <a th:href="@{/member/login}" class="btn btn-outline-secondary">로그인</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</html>
