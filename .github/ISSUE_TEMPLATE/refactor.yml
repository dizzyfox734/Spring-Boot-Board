name: Refactor
description: 구조 개선, 중복 제거, 가독성/유지보수성 개선 작업
title: "[Refactor] 내용을 짧게 입력하세요"
labels: ["refactor"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 개요
      description: 어떤 리팩토링을 하려는지 간단히 적어주세요.
      placeholder: 예) 회원가입 서비스 중복 로직 분리 및 메서드 구조 개선
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 현재 문제점
      description: 기존 코드의 문제를 구체적으로 적어주세요.
      placeholder: |
        예)
        - Service에 검증/저장/변환 책임이 한 메서드에 몰려 있음
        - 중복 로직이 여러 곳에 흩어져 있음
        - 메서드 길이가 길어 가독성이 떨어짐
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 변경 범위
      description: 어떤 클래스/메서드/레이어를 수정하는지 적어주세요.
      placeholder: |
        예)
        - MemberService
        - MemberController 일부 호출 구조
        - DTO 변환 로직
    validations:
      required: true

  - type: textarea
    id: non_scope
    attributes:
      label: 제외 범위
      description: 이번 리팩토링에서 하지 않을 범위를 적어주세요.
      placeholder: |
        예)
        - 회원가입 API 스펙 변경 없음
        - DB 스키마 변경 없음
        - 프론트엔드 수정 없음
    validations:
      required: false

  - type: dropdown
    id: complexity
    attributes:
      label: 복잡도
      description: 이번 리팩토링의 복잡도를 선택해주세요.
      options:
        - Low (< 1시간)
        - Medium (1-3시간)
        - High (> 3시간)
    validations:
      required: true

  - type: textarea
    id: before_after
    attributes:
      label: Before/After 예시 (선택)
      description: 구체적 변경 예시가 있으면 리뷰하기 좋습니다.
      placeholder: |
        예)
        Before:
        ```java
        // 변경 전 코드
        ```
        
        After:
        ```java
        // 변경 후 코드
        ```
    validations:
      required: false

  - type: textarea
    id: expected_effect
    attributes:
      label: 기대 효과 (선택)
      description: 어떤 개선 효과가 있는지 적어주세요.
      placeholder: |
        예)
        - 메서드 책임이 명확해짐
        - 테스트 작성이 쉬워짐
        - 추후 기능 확장 시 수정 범위 축소
    validations:
      required: false

  - type: textarea
    id: risks
    attributes:
      label: 영향도 / 주의사항
      description: 리팩토링으로 인해 주의해야 할 점을 적어주세요.
      placeholder: |
        예)
        - 기존 회원가입 흐름이 깨지지 않도록 회귀 테스트 필요
        - 예외 메시지 변경 여부 확인 필요
    validations:
      required: false

  - type: checkboxes
    id: done
    attributes:
      label: 완료 조건
      description: 이 이슈 완료 기준을 적어주세요. (모두 체크되어야 DONE)
      options:
        - label: 코드 리팩토링 완료
        - label: 기존 테스트 모두 통과
        - label: 새로운 단위 테스트 추가/검증
        - label: 기존 기능 동작 동일함 확인
        - label: PR 리뷰 승인 완료
    validations:
      required: true

  - type: checkboxes
    id: breaking_changes
    attributes:
      label: Breaking Changes 확인
      description: 다음 중 해당하는 항목이 있다면 체크해주세요.
      options:
        - label: 메서드 시그니처 변경 있음
        - label: Exception 타입/메시지 변경 있음
        - label: API 응답 구조 변경 있음
        - label: 기타 Breaking Changes 있음
    validations:
      required: false

  - type: textarea
    id: reference
    attributes:
      label: 참고 사항
      description: 관련 이슈나 PR 링크를 남겨주세요. (#123 형식)
      placeholder: 예) #15 Test 이슈, #12 Feature 이슈
    validations:
      required: false